<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skills — Irma Houver Sing</title>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark');</script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>
<body>
  <div class="scene">
    <div class="phone">
      <div class="notch"></div>
      <div class="screen">

        <div class="status-bar"></div>

        <div class="content-area">
          <div class="page active">
            <div class="section-title" data-i18n="skills.title">Skills</div>

            <div class="skill-group">
              <div class="skill-group-label">Frontend</div>
              <div class="skill-chips">
                <span class="skill-chip chip-a">React</span>
                <span class="skill-chip chip-a">React Native</span>
                <span class="skill-chip chip-a">Angular</span>
                <span class="skill-chip chip-b">TypeScript</span>
                <span class="skill-chip chip-b">Framer Motion</span>
              </div>
            </div>

            <div class="skill-group">
              <div class="skill-group-label">Backend</div>
              <div class="skill-chips">
                <span class="skill-chip chip-c">Java Spring Boot</span>
                <span class="skill-chip chip-c">REST APIs</span>
                <span class="skill-chip chip-d">SQL</span>
              </div>
            </div>

            <div class="skill-group">
              <div class="skill-group-label" data-i18n="skills.tools">Tools &amp; Methods</div>
              <div class="skill-chips">
                <span class="skill-chip chip-b">Git / GitHub</span>
                <span class="skill-chip chip-d">Agile / Scrum</span>
                <span class="skill-chip chip-a">Figma</span>
                <span class="skill-chip chip-c" data-i18n="skills.aws">AWS (in progress)</span>
              </div>
            </div>

            <div style="margin-top:14px;">
              <div class="skill-group-label" data-i18n="skills.levels">Proficiency</div>
              <div class="skill-bar-row">
                <div class="skill-bar-label"><span>React / TS</span><span>90%</span></div>
                <div class="skill-bar-track"><div class="skill-bar-fill" data-w="90"></div></div>
              </div>
              <div class="skill-bar-row">
                <div class="skill-bar-label"><span>Spring Boot</span><span>78%</span></div>
                <div class="skill-bar-track"><div class="skill-bar-fill" data-w="78"></div></div>
              </div>
              <div class="skill-bar-row">
                <div class="skill-bar-label"><span>Angular</span><span>70%</span></div>
                <div class="skill-bar-track"><div class="skill-bar-fill" data-w="70"></div></div>
              </div>
              <div class="skill-bar-row">
                <div class="skill-bar-label"><span>React Native</span><span>65%</span></div>
                <div class="skill-bar-track"><div class="skill-bar-fill" data-w="65"></div></div>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-nav"></div>

        <div class="home-indicator"><div class="home-pill"></div></div>

      </div>
    </div>
  </div>
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
